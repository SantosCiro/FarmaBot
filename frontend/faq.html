<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FarmaBot - FAQ Admin</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f2f2f2; margin:0; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 16px; }
    .card { background:#fff; border-radius: 12px; padding: 14px; box-shadow: 0 2px 10px rgba(0,0,0,.08); margin-bottom: 12px; }
    h1 { margin: 0 0 8px; font-size: 20px; }
    .row { display:flex; gap:10px; flex-wrap: wrap; align-items: center; }
    input, textarea { width:100%; padding:10px; border:1px solid #ddd; border-radius: 10px; }
    textarea { min-height: 70px; resize: vertical; }
    button { padding: 10px 14px; border:0; border-radius: 10px; cursor:pointer; }
    .btn { background:#111; color:#fff; }
    .btn2 { background:#eaeaea; }
    .danger { background:#c62828; color:#fff; }
    .mini { font-size:12px; color:#666; }
    .item { border-top:1px solid #eee; padding-top:12px; margin-top:12px; }
    .cols { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    @media (max-width:700px){ .cols{ grid-template-columns: 1fr; } }
    .topbar { display:flex; justify-content: space-between; align-items:center; gap:10px; flex-wrap: wrap; }
    .pill { background:#f6f6f6; padding:6px 10px; border-radius: 999px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="topbar">
        <h1>FAQ Admin (FarmaBot Pro)</h1>
        <div class="row">
          <span class="pill">API: http://127.0.0.1:8000</span>
          <button class="btn2" id="reloadBtn">Recarregar</button>
        </div>
      </div>

      <p class="mini">
        Dica: em <b>keywords</b>, separe por <b>|</b>. Ex: <code>horário|abre|fecha</code>
      </p>

      <div class="cols">
        <div>
          <label><b>Keywords</b></label>
          <input id="newKeywords" placeholder="ex: horário|abre|fecha" />
        </div>
        <div>
          <label><b>Resposta</b></label>
          <textarea id="newAnswer" placeholder="Digite a resposta..."></textarea>
        </div>
      </div>
      <div class="row" style="margin-top:10px;">
        <button class="btn" id="addBtn">Adicionar FAQ</button>
        <span class="mini" id="msg"></span>
      </div>
    </div>

    <div class="card">
      <h1>FAQs cadastradas</h1>
      <div id="list"></div>
    </div>
  </div>

<script>
const API = "http://127.0.0.1:8000";

const elList = document.getElementById("list");
const elMsg = document.getElementById("msg");

function showMsg(text) {
  elMsg.textContent = text;
  setTimeout(() => elMsg.textContent = "", 2500);
}

async function apiGetFaq() {
  const r = await fetch(`${API}/faq`);
  return r.json();
}

async function apiAddFaq(keywords, answer) {
  const r = await fetch(`${API}/faq`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({keywords, answer})
  });
  return r.json();
}

async function apiUpdateFaq(id, keywords, answer) {
  const r = await fetch(`${API}/faq/${id}`, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({keywords, answer})
  });
  return r.json();
}

async function apiDeleteFaq(id) {
  const r = await fetch(`${API}/faq/${id}`, { method: "DELETE" });
  return r.json();
}

function render(items) {
  elList.innerHTML = "";
  if (!items.length) {
    elList.innerHTML = `<p class="mini">Nenhuma FAQ encontrada.</p>`;
    return;
  }

  for (const it of items) {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="mini">ID: <b>${it.id}</b> • criado em: ${it.created_at || "-"}</div>
      <div class="cols" style="margin-top:8px;">
        <div>
          <label><b>Keywords</b></label>
          <input data-k="${it.id}" value="${(it.keywords || "").replaceAll('"','&quot;')}" />
        </div>
        <div>
          <label><b>Resposta</b></label>
          <textarea data-a="${it.id}">${it.answer || ""}</textarea>
        </div>
      </div>
      <div class="row" style="margin-top:10px;">
        <button class="btn" data-save="${it.id}">Salvar</button>
        <button class="danger" data-del="${it.id}">Apagar</button>
        <span class="mini" data-status="${it.id}"></span>
      </div>
    `;

    elList.appendChild(div);
  }

  // binds
  elList.querySelectorAll("[data-save]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const id = btn.getAttribute("data-save");
      const kw = elList.querySelector(`[data-k="${id}"]`).value.trim();
      const ans = elList.querySelector(`[data-a="${id}"]`).value.trim();
      const st = elList.querySelector(`[data-status="${id}"]`);

      st.textContent = "Salvando...";
      const res = await apiUpdateFaq(id, kw, ans);
      st.textContent = res.ok ? "Salvo ✅" : "Falhou ❌";
      setTimeout(() => st.textContent = "", 2500);
    });
  });

  elList.querySelectorAll("[data-del]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const id = btn.getAttribute("data-del");
      const ok = confirm("Tem certeza que deseja apagar esta FAQ?");
      if (!ok) return;

      const res = await apiDeleteFaq(id);
      if (res.ok) {
        showMsg("FAQ apagada ✅");
        await load();
      } else {
        showMsg("Falhou ao apagar ❌");
      }
    });
  });
}

async function load() {
  const data = await apiGetFaq();
  render(data.faq || []);
}

document.getElementById("reloadBtn").addEventListener("click", load);

document.getElementById("addBtn").addEventListener("click", async () => {
  const kw = document.getElementById("newKeywords").value.trim();
  const ans = document.getElementById("newAnswer").value.trim();
  if (!kw || !ans) return showMsg("Preencha keywords e resposta.");

  const res = await apiAddFaq(kw, ans);
  if (res.ok === false) return showMsg("Falhou ao adicionar ❌");

  document.getElementById("newKeywords").value = "";
  document.getElementById("newAnswer").value = "";
  showMsg("FAQ adicionada ✅");
  await load();
});

load();
</script>
</body>
</html>
