<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FarmaBot - FAQ Admin</title>

<style>

body{
  font-family: Arial, sans-serif;
  background:#f2f2f2;
  margin:0;
}

/* NAVBAR */

.nav{
  background:#0f172a;
  padding:10px 16px;
  color:white;
  display:flex;
  align-items:center;
  gap:14px;
}

.nav a{
  color:white;
  text-decoration:none;
}

.nav a:hover{
  text-decoration:underline;
}

/* LAYOUT */

.wrap{
  max-width:900px;
  margin:0 auto;
  padding:16px;
  padding-top:12px;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:16px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h2{
  margin-top:0;
}

input{
  padding:10px;
  border:1px solid #ddd;
  border-radius:8px;
  width:100%;
}

textarea{
  padding:10px;
  border:1px solid #ddd;
  border-radius:8px;
  width:100%;
  resize:vertical;
}

.row{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

button{
  padding:8px 12px;
  border:0;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

/* TABELA */

table{
  width:100%;
  border-collapse:collapse;
  margin-top:12px;
}

th,td{
  border-bottom:1px solid #eee;
  padding:10px;
  text-align:left;
}

th{
  background:#f7f7f7;
}

</style>
</head>

<body>

<div class="nav">
  <b>FarmaBot</b> |
  <span id="companyLabel">Empresa: ...</span> |
  <a id="chatLink" href="#">Chat</a>
  <a id="ticketsLink" href="#">Tickets</a>
  <a id="faqLink" href="#">FAQ Admin</a>
</div>

<div class="wrap">

<div class="card">

<h2>Gerenciar FAQ</h2>

<div class="row">
<input id="keywords" placeholder="Palavras-chave (ex: horario|abre|fecha)">
</div>

<div class="row">
<textarea id="answer" rows="3" placeholder="Resposta"></textarea>
</div>

<div class="row">
<button onclick="addFaq()">Adicionar FAQ</button>
<button onclick="loadFAQ()">Atualizar</button>
</div>

<table>

<thead>
<tr>
<th>ID</th>
<th>Keywords</th>
<th>Resposta</th>
<th>Criado em</th>
</tr>
</thead>

<tbody id="faq"></tbody>

</table>

</div>
</div>

<script>

const API = "http://127.0.0.1:8000";

const params = new URLSearchParams(window.location.search);
const company = params.get("c") || "poupalar";
document.getElementById("chatLink").href = `/?c=${company}`;
document.getElementById("ticketsLink").href = `tickets.html?c=${company}`;
document.getElementById("faqLink").href = `faq.html?c=${company}`;
document.getElementById("companyLabel").textContent = `Empresa: ${company}`;

async function loadFAQ(){

  try{

    const res=await fetch(`${API}/${company}/faq`)
    const data=await res.json()

    const tbody=document.getElementById("faq")
    tbody.innerHTML=""

    data.faq.forEach(f=>{

      const tr=document.createElement("tr")

      tr.innerHTML=`
      <td>${f.id}</td>
      <td>${f.keywords}</td>
      <td>${f.answer}</td>
      <td>${f.created_at}</td>
      `

      tbody.appendChild(tr)

    })

  }catch(e){

    alert("Erro ao conectar na API. Backend está rodando?")

  }

}

async function createFAQ(){

  const keywords=document.getElementById("keywords").value.trim()
  const answer=document.getElementById("answer").value.trim()

  if(!keywords || !answer){
    alert("Preencha keywords e resposta")
    return
  }

  try{

    await fetch(`${API}/${company}/faq`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        keywords:keywords,
        answer:answer
      })
    })

    document.getElementById("keywords").value=""
    document.getElementById("answer").value=""

    loadFAQ()

  }catch(e){

    alert("Erro ao salvar FAQ")

  }

}

loadFAQ()

</script>

</body>
</html>
