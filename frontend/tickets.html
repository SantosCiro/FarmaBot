<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FarmaBot - Tickets</title>

<style>

body{
  font-family: Arial, sans-serif;
  background:#f2f2f2;
  margin:0;
}

/* Navbar */

.nav{
  background:#0f172a;
  padding:10px 16px;
  color:white;
  position:sticky;
  top:0;
  z-index:10;
}

.nav a{
  color:white;
  text-decoration:none;
}

.nav a:hover{
  text-decoration:underline;
}

/* layout */

.wrap{
  max-width:900px;
  margin:0 auto;
  padding:16px;
  padding-top:12px;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:16px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h2{
  margin-top:0;
}

button{
  padding:8px 12px;
  border:0;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

/* tabela */

table{
  width:100%;
  border-collapse:collapse;
  margin-top:12px;
}

th,td{
  border-bottom:1px solid #eee;
  padding:10px;
  text-align:left;
}

th{
  background:#f7f7f7;
}

</style>
</head>

<body>

<div class="nav">
<b>FarmaBot</b> |
<a href="index.html">Chat</a> |
<a href="tickets.html">Tickets</a> |
<a href="faq.html">FAQ Admin</a>
</div>

<div class="wrap">

<div class="card">

<h2>Painel de Tickets</h2>

<button onclick="loadTickets()">Atualizar</button>

<table>

<thead>
<tr>
<th>ID</th>
<th>Data</th>
<th>Nome</th>
<th>Telefone</th>
<th>Mensagem</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tickets"></tbody>

</table>

</div>
</div>

<script>

const API="http://127.0.0.1:8000"

async function loadTickets(){

  try{

    const res=await fetch(`${API}/tickets`)
    const data=await res.json()

    const tbody=document.getElementById("tickets")
    tbody.innerHTML=""

    data.tickets.forEach(t=>{

      const tr=document.createElement("tr")

      tr.innerHTML=`
      <td>${t.id}</td>
      <td>${t.created_at}</td>
      <td>${t.name||""}</td>
      <td>${t.phone||""}</td>
      <td>${t.message}</td>
      <td>${t.status}</td>
      `

      tbody.appendChild(tr)

    })

  }catch(e){

    alert("Erro ao conectar na API. Backend está rodando?")

  }

}

loadTickets()

</script>

</body>
</html>
