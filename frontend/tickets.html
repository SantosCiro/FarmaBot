<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FarmaBot - Tickets</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f2f2f2;
  margin:0;
}

.nav{
  background:#0f172a;
  padding:10px 16px;
  color:white;
  display:flex;
  align-items:center;
  gap:14px;
}

.nav a{
  color:white;
  text-decoration:none;
}

.nav a:hover{
  text-decoration:underline;
}

.wrap{
  max-width:1000px;
  margin:0 auto;
  padding:16px;
  padding-top:12px;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:16px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h2{
  margin-top:0;
}

.toolbar{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
  margin-bottom:12px;
}

button{
  padding:8px 12px;
  border:0;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
}

.badge-open{
  background:#fff3cd;
  color:#856404;
}

.badge-closed{
  background:#d4edda;
  color:#155724;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:12px;
}

th, td{
  border-bottom:1px solid #eee;
  padding:10px;
  text-align:left;
  vertical-align:top;
}

th{
  background:#f7f7f7;
}

tr.open-ticket{
  background:#fffdf2;
}

.small{
  color:#666;
  font-size:12px;
  margin-top:8px;
}

.counter{
  font-size:14px;
  color:#333;
}
</style>
</head>

<body>

<div class="nav">
  <b>FarmaBot</b> |
  <span id="companyLabel">Empresa: ...</span> |
  <a id="chatLink" href="#">Chat</a>
  <a id="ticketsLink" href="#">Tickets</a>
  <a id="faqLink" href="#">FAQ Admin</a>
</div>

<div class="wrap">
  <div class="card">
    <h2>Painel de Tickets</h2>

    <div class="toolbar">
      <button onclick="loadTickets()">Atualizar</button>
      <button onclick="toggleSound()" id="soundBtn">🔔 Som: ON</button>
      <span class="counter" id="openCounter">Abertos: 0</span>
    </div>

    <div class="small" id="companyInfo"></div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Data</th>
          <th>Nome</th>
          <th>Telefone</th>
          <th>Mensagem</th>
          <th>Status</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody id="tickets"></tbody>
    </table>
  </div>
</div>

<script>
const API = window.location.origin;
const params = new URLSearchParams(window.location.search);
const company = params.get("c") || "poupalar";

document.getElementById("chatLink").href = `/?c=${company}`;
document.getElementById("ticketsLink").href = `tickets.html?c=${company}`;
document.getElementById("faqLink").href = `faq.html?c=${company}`;
document.getElementById("companyLabel").textContent = `Empresa: ${company.toUpperCase()}`;

let lastTicketId = null;
let soundEnabled = true;

function playBeep() {
  if (!soundEnabled) return;

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();

  oscillator.type = "sine";
  oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
  gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);

  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  oscillator.start();
  oscillator.stop(audioCtx.currentTime + 0.2);
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById("soundBtn").textContent = soundEnabled ? "🔔 Som: ON" : "🔕 Som: OFF";
}

async function changeStatus(ticketId, newStatus) {
  try {
    const res = await fetch(`${API}/${company}/tickets/${ticketId}/status`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status: newStatus })
    });

    const data = await res.json();

    if (!data.ok) {
      alert("Não foi possível atualizar o ticket.");
      return;
    }

    loadTickets(false);
  } catch (e) {
    alert("Erro ao atualizar ticket.");
  }
}

async function loadTickets(checkNew = true) {
  try {
    const res = await fetch(`${API}/${company}/tickets`);
    const data = await res.json();

    const tickets = data.tickets || [];
    const tbody = document.getElementById("tickets");
    tbody.innerHTML = "";

    let openCount = 0;

    if (tickets.length > 0) {
      const newestId = tickets[0].id;

      if (checkNew && lastTicketId !== null && newestId > lastTicketId) {
        playBeep();
      }

      lastTicketId = newestId;
    }

    tickets.forEach(t => {
      if (t.status === "open") openCount++;

      const tr = document.createElement("tr");
      if (t.status === "open") tr.classList.add("open-ticket");

      const badgeClass = t.status === "open" ? "badge badge-open" : "badge badge-closed";
      const actionBtn = t.status === "open"
        ? `<button onclick="changeStatus(${t.id}, 'closed')">Fechar</button>`
        : `<button onclick="changeStatus(${t.id}, 'open')">Reabrir</button>`;

      tr.innerHTML = `
        <td>${t.id}</td>
        <td>${t.created_at || ""}</td>
        <td>${t.name || ""}</td>
        <td>${t.phone || ""}</td>
        <td>${t.message || ""}</td>
        <td><span class="${badgeClass}">${t.status}</span></td>
        <td>${actionBtn}</td>
      `;

      tbody.appendChild(tr);
    });

    document.getElementById("openCounter").textContent = `Abertos: ${openCount}`;

  } catch (e) {
    alert("Erro ao conectar na API. Backend está rodando?");
  }
}

loadTickets(false);
setInterval(() => loadTickets(true), 10000);
</script>

</body>
</html>
