<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FarmaBot - Tickets</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f2f2f2;
  margin:0;
}

.nav{
  background:#0f172a;
  padding:10px 16px;
  color:white;
  display:flex;
  align-items:center;
  gap:14px;
}

.nav a{
  color:white;
  text-decoration:none;
}

.nav a:hover{
  text-decoration:underline;
}

.wrap{
  max-width:900px;
  margin:0 auto;
  padding:16px;
  padding-top:12px;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:16px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h2{
  margin-top:0;
}

button{
  padding:8px 12px;
  border:0;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:12px;
}

th, td{
  border-bottom:1px solid #eee;
  padding:10px;
  text-align:left;
  vertical-align:top;
}

th{
  background:#f7f7f7;
}

.small{
  color:#666;
  font-size:12px;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="nav">
  <b>FarmaBot</b> |
  <span id="companyLabel">Empresa: ...</span> |
  <a id="chatLink" href="#">Chat</a>
  <a id="ticketsLink" href="#">Tickets</a>
  <a id="faqLink" href="#">FAQ Admin</a>
</div>

<div class="wrap">
  <div class="card">
    <h2>Painel de Tickets</h2>
    <button onclick="loadTickets()">Atualizar</button>
    <div class="small" id="companyInfo"></div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Data</th>
          <th>Nome</th>
          <th>Telefone</th>
          <th>Mensagem</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tickets"></tbody>
    </table>
  </div>
</div>

<script>
const API = window.location.origin;
const params = new URLSearchParams(window.location.search);
const company = params.get("c") || "poupalar";
document.getElementById("chatLink").href = `/?c=${company}`;
document.getElementById("ticketsLink").href = `tickets.html?c=${company}`;
document.getElementById("faqLink").href = `faq.html?c=${company}`;
document.getElementById("companyLabel").textContent = `Empresa: ${company}`;

async function loadTickets() {
  try {
    const res = await fetch(`${API}/${company}/tickets`);
    const data = await res.json();

    const tbody = document.getElementById("tickets");
    tbody.innerHTML = "";

    (data.tickets || []).forEach(t => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${t.id}</td>
        <td>${t.created_at}</td>
        <td>${t.name || ""}</td>
        <td>${t.phone || ""}</td>
        <td>${t.message}</td>
        <td>${t.status}</td>
      `;

      tbody.appendChild(tr);
    });

  } catch (e) {
    alert("Erro ao conectar na API. Backend está rodando?");
  }
}

loadTickets();
</script>

</body>
</html>
