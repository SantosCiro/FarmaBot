<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FarmaBot - Simulador</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f2f2f2; margin:0; }

    /* Navbar */
    .nav{
     background:#0f172a;
     padding:10px 16px;
     color:white;
     display:flex;
     align-items:center;
     gap:14px;
   }
    
    .nav a{
    color:white;
    text-decoration:none;
   }
   
    .nav a:hover{
   text-decoration:underline;
   }

    .wrap { max-width: 720px; margin: 0 auto; padding: 16px; padding-top: 12px; }
    .card { background:#fff; border-radius: 12px; padding: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    .top { display:flex; gap:12px; margin-bottom: 10px; }
    input { padding:10px; border:1px solid #ddd; border-radius:10px; width:100%; }
    .chat { height: 520px; overflow:auto; padding: 12px; background:#e9f0e9; border-radius: 12px; }
    .msg { max-width: 80%; padding: 10px 12px; border-radius: 12px; margin: 8px 0; white-space: pre-wrap; }
    .me { background:#d1ecff; margin-left:auto; }
    .bot { background:#fff; border: 1px solid #e6e6e6; }
    .row { display:flex; gap:10px; margin-top: 10px; }
    button { padding: 10px 14px; border:0; border-radius: 10px; cursor:pointer; }
    button:hover { opacity:.9; }
    .send { width: 120px; }
    .hint { color:#666; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>

  <div class="nav">
    <b>FarmaBot</b> |
    <span id="companyLabel">Empresa: ...</span> |
    <a id="chatLink" href="#">Chat</a>
    <a id="ticketsLink" href="#">Tickets</a>
    <a id="faqLink" href="#">FAQ Admin</a>
  </div>

  <div class="wrap">
    <div class="card">
      <div id="chat" class="chat"></div>

      <div class="row">
        <input id="text" placeholder="Digite sua mensagem..." />
        <button class="send" id="send">Enviar</button>
      </div>
      <div class="hint">Dica: teste “horário”, “entrega”, “endereço”, “tem dipirona?”, “falar com atendente”.</div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    const params = new URLSearchParams(window.location.search);
    const company = params.get("c") || "poupalar";
    document.getElementById("chatLink").href = `/?c=${company}`;
    document.getElementById("ticketsLink").href = `tickets.html?c=${company}`;
    document.getElementById("faqLink").href = `faq.html?c=${company}`;
    document.getElementById("companyLabel").textContent = `Empresa: ${company.toUpperCase()}`;
    const chat = document.getElementById("chat");
    const text = document.getElementById("text");
    const sendBtn = document.getElementById("send");

    function addMsg(who, content) {
      const div = document.createElement("div");
      div.className = `msg ${who}`;
      div.textContent = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
      const msg = text.value.trim();
      if (!msg) return;
      addMsg("me", msg);
      text.value = "";

      const payload = { message: msg };

      try {
        const res = await fetch(`${API}/${company}/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        addMsg("bot", data.reply);
      } catch (e) {
        addMsg("bot", "Erro ao conectar no servidor. Você ligou o backend?");
      }
    }

    addMsg("bot", `Olá! 👋 Sou o assistente virtual da ${company.toUpperCase()}. Posso te ajudar com horário, entrega, endereço e dúvidas frequentes.`);

    sendBtn.addEventListener("click", send);
    text.addEventListener("keydown", (e) => {
      if (e.key === "Enter") send();
    });
  </script>
</body>
</html>
